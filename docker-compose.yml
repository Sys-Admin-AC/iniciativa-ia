# Stack completo del microservicio (API + Postgres + Qdrant).
# Uso: desde este directorio, `docker compose up -d` y exponer 8000 (o el mapeo que definas).
#
# La app Yii (otro repositorio) llama a este API solo a través de su proxy, usando en el contenedor
# PHP la variable de entorno AI_BACKEND_INTERNAL_URL (p. ej. http://host.docker.internal:8008).

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_password}
      POSTGRES_DB: ${POSTGRES_DB:-th_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_user} -d ${POSTGRES_DB:-th_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
    ports:
      # Host 8008 por defecto = mismo puerto que aiBackend en config/params.php
      - "${API_PORT:-8008}:8000"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-ai_user}:${POSTGRES_PASSWORD:-ai_password}@postgres:5432/${POSTGRES_DB:-th_ai}
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
