# Stack del microservicio (API + Qdrant). La base MariaDB vive fuera de Docker.
# Uso: desde este directorio, `docker compose up -d` y exponer 8000 (o el mapeo que definas).
#
# La app Yii (otro repositorio) llama a este API solo a través de su proxy, usando en el contenedor
# PHP la variable de entorno AI_BACKEND_INTERNAL_URL (p. ej. http://host.docker.internal:8008).

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
    ports:
      # Host 8008 por defecto = mismo puerto que aiBackend en config/params.php
      - "${API_PORT:-8008}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mariadb+pymysql://root:root@host.docker.internal:3306/talento_humano}
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    volumes:
      - .:/app
    depends_on:
      qdrant:
        condition: service_started

volumes:
  qdrant_data:
